<!DOCTYPE html>
<html>
<head>
  <title>Tickets</title>
  <style>
    body { font-family: sans-serif; max-width: 600px; margin: 40px auto; }
    #tickets div { padding: 8px; border-bottom: 1px solid #ddd; }
    input, button { padding: 6px; margin-right: 6px; margin-bottom: 8px; }
    #app { display: none; }
    #error { color: red; }
  </style>
</head>
<body>
  <div id="auth">
    <h2>Login</h2>
    <input id="email" placeholder="Email">
    <input id="password" placeholder="Password" type="password">
    <button onclick="login()">Log in</button>
    <button onclick="signup()">Sign up</button>
    <div id="error"></div>
  </div>

  <div id="app">
    <h1>Tickets</h1>
    <button onclick="logout()">Log out</button>
    <div>
      <input id="title" placeholder="Title">
      <input id="body" placeholder="Body">
      <button id="addBtn" onclick="saveTicket()">Add</button>
    </div>
    <div id="tickets"></div>
  </div>

  <script>
    let token = null;
    let editId = null;
    async function signup() {
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const res = await fetch('/signup', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      });
      if (!res.ok) {
        const err = await res.json();
        document.getElementById('error').textContent = JSON.stringify(err.error);
        return;
      }
      document.getElementById('error').textContent = 'Signed up — now log in.';
    }

    async function login() {
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const res = await fetch('/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      });
      if (!res.ok) {
        document.getElementById('error').textContent = 'Login failed';
        return;
      }
      const data = await res.json();
      token = data.token;
      document.getElementById('auth').style.display = 'none';
      document.getElementById('app').style.display = 'block';
      loadTickets();
    }

    function logout() {
      token = null;
      document.getElementById('app').style.display = 'none';
      document.getElementById('auth').style.display = 'block';
    }

   async function loadTickets() {
  const res = await fetch('/tickets', {
    headers: { Authorization: `Bearer ${token}` }
  });
  if (!res.ok) {
    const err = await res.json();
    document.getElementById('tickets').innerHTML = `Error: ${JSON.stringify(err)}`;
    return;
  }
  const tickets = await res.json();
  const container = document.getElementById('tickets');
  container.innerHTML='';
  tickets.forEach(t => {
    const div = document.createElement('div');
    const text = document.createElement('span');
    text.textContent=`${t.title}: ${t.body}`;
    const editBtn = document.createElement('button');
    editBtn.textContent = 'Edit';
    const delBtn = document.createElement('button');
    delBtn.textContent = 'Delete';
    editBtn.addEventListener('click', () => startEdit(t.id, t.title, t.body));
    delBtn.addEventListener('click', () => deleteTicket(t.id));
    div.append(text, editBtn, delBtn);
    container.appendChild(div);

  }); 
}

    async function createTicket() {
      const title = document.getElementById('title').value;
      const body = document.getElementById('body').value;
      await fetch('/tickets', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${token}` },
        body: JSON.stringify({ title, body })
      });
      console.log(`${body}`);
      body.innerHTML = "Body";
      title.innerHTML = "Title";
      loadTickets();
    }

    async function deleteTicket(id) {
      await fetch (`/tickets/${id}`, {
        method: 'DELETE',
        headers: {Authorization: `Bearer ${token}` } 
      });
      loadTickets();
    }

    async function startEdit(id, title, body) {
      editId=id;
      document.getElementById('title').value=title;
      document.getElementById('body').value=body;
      document.getElementById('addBtn').textContent = 'Save';
    }

    async function saveTicket() {
      const title = document.getElementById('title').value;
      const body = document.getElementById('body').value;
      
      if (editId){
        await fetch (`tickets/${editId}`,
        {
          method: 'PATCH', 
          headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${token}`},
          body: JSON.stringify({title,body})
      });
      editId = null;
      document.getElementById('addBtn').textContent='Add';
      }else{
        await fetch ('/tickets', {
          method: 'POST',
          headers: {'Content-Type': 'application/json', Authorization: `Bearer: ${token}`},
          body: JSON.stringify({title, body})
        });
      }

      document.getElementById('title').value='';
      document.getElementById('body').value='';
      loadTickets();
    }

  </script>
</body>
</html>
